# startups.yml — Direct startup career-page watchlist (§3, mode: scan-startups)
# For /career-ops scan-startups and `node scan.mjs --config startups.yml`.
#
# Each entry:
#   name         company name
#   careers_url  direct careers/ATS URL (VERIFIED to resolve 2026-07-02)
#   ats          greenhouse | lever | ashby | workable | workday | notion | custom
#   city         primary hiring city / Remote
#   hr_email     optional HR/careers email (enables Gmail-MCP applications §9)
#   enabled      true/false
#   tier         1 (top target) | 2 | 3
#
# scan.mjs auto-hits greenhouse/ashby/lever entries (zero-token). workday/
# workable/notion/custom have no zero-token provider — scan-startups mode
# navigates those with Playwright. Add a company by name:
# `/career-ops add-startup <name>` (agent finds + verifies the page, appends here).

title_filter:
  positive:
    - "AI Engineer"
    - "ML Engineer"
    - "AI/ML"
    - "LLM"
    - "Generative AI"
    - "GenAI"
    - "RAG"
    - "AI Agent"
    - "Agentic"
    - "Voice AI"
    - "NLP"
    - "Machine Learning"
    - "Deep Learning"
    - "Applied AI"
    - "Data Scientist"
    - "AI Developer"
    - "Fresher"
    - "New Grad"
    - "Graduate"
    - "Junior"
    - "AI Intern"
  negative:
    - "3+ years"
    - "4+ years"
    - "5+ years"
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Director"
    - "VP"
    - "Frontend"
    - "Sales"

default_posted_window: "7d"    # startup pages update less often than boards


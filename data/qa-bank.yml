# qa-bank.yml — Makilesh's application answer bank. EDIT THIS FREELY.
#
# HOW IT WORKS (zero-token by design):
#   • When a form asks a question, the system finds the closest entry here.
#   • A direct/near match  → your stored answer is used AS-IS. No LLM, no tokens.
#   • {{company}} / {{role}} are filled in automatically per application.
#   • Only a genuinely NEW question triggers adaptation — and that now runs on
#     the FREE local model (Qwen), so it still costs zero cloud tokens.
#   • Truly new personal questions (odd salary/visa/etc.) pause and ask you.
#
# TO MAKE ANSWERS SOUND LIKE YOU: just edit the "a:" text below. Keep "q:" close
# to how forms phrase the question (add extra q entries for other phrasings).
# Note: when the system auto-learns a new answer it rewrites this file and these
# comments are dropped — the guide also lives in MANUAL.md.
# ═══════════════════════════════════════════════════════════════════════
